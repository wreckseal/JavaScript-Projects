<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>JavaScript Program</title>
        <script src="js/main.js" defer></script>
        <link rel="stylesheet" type="text/css" href="css/main.css">
    </head>
    <body>
        <h1 id="heading">Slideshow Demo</h1>
        <h5 id="heading">Automatic slideshow</h5>
        <!-- Slideshow container -->
        <div class="slideshow-container">

            <!-- Full-width images with number and caption text -->
            <div class="mySlides fade">
                <div class="numberText"></div>
                <img src="images/car1.jpg" style="width: 100%;">
                <div class="text">Blue car</div>
            </div>

            <div class="mySlides fade">
                <div class="numberText"></div>
                <img src="images/car2.jpg" style="width: 100%;">
                <div class="text">Sports car</div>
            </div>

            <div class="mySlides fade">
                <div class="numberText"></div>
                <img src="images/car3.jpg" style="width: 100%;">
                <div class="text">Chevrolet Camaro SS</div>
            </div>

            <!-- Next and previous buttons -->
            <a class="prev" onclick="plusSlides(-1)">&#10094</a>
            <a class="next" onclick="plusSlides(1)">&#10095</a>
        </div>
        <br>

        <!-- The dots/circles -->
        <div style="text-align: center;">
            <span class="dot" onclick="currentSlide(1)"></span>
            <span class="dot" onclick="currentSlide(2)"></span>
            <span class="dot" onclick="currentSlide(3)"></span>
        </div>
    </body>
</html>
