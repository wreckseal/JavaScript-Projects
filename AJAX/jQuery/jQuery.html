<!DOCTYPE html>
<html lang="en">
    <head>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.0/jquery.min.js"></script>
    </head>
    <script>
        $(document).ready(function() {
            $("html").append(
                "<body>\
                    <div id='container'>\
                        <div id='inner'>\
                            <h1>Basic jQuery</h1>\
                            <p id='1'>Paragraph 1</p>\
                            <p id='2'>Paragraph 2</p>\
                            <p id='3'>Paragraph 3</p>\
                        </div>\
                    </div>\
                </body>"
            );
            // Paragraph 2 will change its color to red after page load.
            $("#2").css({"color":"red"});
            $("#3").click(function() {
                // When Paragraph 3 is clicked, the Basic jQuery heading will fadeout in 1 second.
                $('h1').fadeOut(1000);
            });
            $("#1").click(function() {
                // When Paragraph 1 is clicked, the Basic jQuery heading will show slowly in 5 second.
                $('h1').show(5000);
            });
        });
    </script>
</html>
